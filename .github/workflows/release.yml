name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. v0.2.0)"
        required: true
        default: "v0.2.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies (desktop)
        working-directory: desktop
        run: npm install

      - name: Build Neutralino (release)
        working-directory: desktop
        run: npm run build:release

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: repoplanner-desktop-dist
          path: desktop/dist/

  zips:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: repoplanner-desktop-dist
      - name: Create platform zips
        run: |
          set +e
          WIN_BIN="repoplanner-desktop-win_x64"
          [ -f "${WIN_BIN}.exe" ] && WIN_BIN="${WIN_BIN}.exe"
          if [ -f "$WIN_BIN" ]; then
            zip -j repoplanner-desktop-windows-x64.zip "$WIN_BIN" resources.neu
          fi
          if [ -f repoplanner-desktop-mac_arm64 ]; then
            zip -j repoplanner-desktop-darwin-arm64.zip repoplanner-desktop-mac_arm64 resources.neu
          fi
          if [ -f repoplanner-desktop-mac_x64 ]; then
            zip -j repoplanner-desktop-darwin-x64.zip repoplanner-desktop-mac_x64 resources.neu
          fi
          if [ -f repoplanner-desktop-linux_x64 ]; then
            zip -j repoplanner-desktop-linux-x64.zip repoplanner-desktop-linux_x64 resources.neu
          fi
          set -e
      - name: Upload zips
        uses: actions/upload-artifact@v4
        with:
          name: repoplanner-desktop-zips
          path: "*.zip"

  release:
    needs: zips
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: repoplanner-desktop-zips
      - run: ls -la
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: |
            repoplanner-desktop-windows-x64.zip
            repoplanner-desktop-darwin-arm64.zip
            repoplanner-desktop-darwin-x64.zip
            repoplanner-desktop-linux-x64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
