name: Release

on:
  release:
    types: [published]
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies (desktop)
        working-directory: desktop
        run: npm install

      - name: Build Neutralino (release)
        working-directory: desktop
        run: npm run build:release

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: repoplanner-desktop-dist
          path: desktop/dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: repoplanner-desktop-dist

      - name: List dist contents
        run: ls -la

      - name: Create platform zips
        run: |
          WIN_BIN="repoplanner-desktop-win_x64"
          [ -f "${WIN_BIN}.exe" ] && WIN_BIN="${WIN_BIN}.exe"
          [ -f "$WIN_BIN" ] && zip -j repoplanner-desktop-windows-x64.zip "$WIN_BIN" resources.neu

          [ -f repoplanner-desktop-mac_arm64 ] && zip -j repoplanner-desktop-darwin-arm64.zip repoplanner-desktop-mac_arm64 resources.neu
          [ -f repoplanner-desktop-mac_x64 ] && zip -j repoplanner-desktop-darwin-x64.zip repoplanner-desktop-mac_x64 resources.neu
          [ -f repoplanner-desktop-linux_x64 ] && zip -j repoplanner-desktop-linux-x64.zip repoplanner-desktop-linux_x64 resources.neu

          ls -la *.zip 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            repoplanner-desktop-windows-x64.zip
            repoplanner-desktop-darwin-arm64.zip
            repoplanner-desktop-darwin-x64.zip
            repoplanner-desktop-linux-x64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
